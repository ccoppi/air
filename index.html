<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Hockey - Menu & Difficoltà</title>
    <style>
        body { 
            background: #1a1a1a; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            color: white; 
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
            touch-action: none; 
        }
        #game-container { position: relative; display: flex; flex-direction: column; align-items: center; }
        canvas { 
            border: 4px solid #fff; 
            background: radial-gradient(circle, #004d40 0%, #002b24 100%);
            max-width: 95vw;
            max-height: 70vh;
            touch-action: none;
            display: none; /* Nascosto all'inizio */
        }
        /* Stili Menu */
        #menu, #ui-overlay {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            width: 200px;
            transition: transform 0.2s;
            color: white;
            font-weight: bold;
        }
        .btn:active { transform: scale(0.95); }
        .btn-easy { background: #4caf50; }
        .btn-medium { background: #ff9800; }
        .btn-hard { background: #f44336; }
        .btn-menu { background: #555; margin-top: 10px; width: auto; padding: 8px 20px; }
        
        #score-board { font-size: 1.5rem; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="menu">
            <h1>AIR HOCKEY</h1>
            <p>Seleziona Difficoltà:</p>
            <button class="btn btn-easy" onclick="startGame(0.06, 3)">FACILE</button>
            <button class="btn btn-medium" onclick="startGame(0.12, 6)">MEDIO</button>
            <button class="btn btn-hard" onclick="startGame(0.20, 10)">DIFFICILE</button>
        </div>

        <div id="score-board">
            Score: <span id="playerScore">0</span> - <span id="cpuScore">0</span>
        </div>
        
        <canvas id="hockey"></canvas>
        
        <button id="backToMenu" class="btn btn-menu" style="display:none;" onclick="showMenu()">TORNA AL MENU</button>
    </div>

<script>
const canvas = document.getElementById('hockey');
const ctx = canvas.getContext('2d');
const menu = document.getElementById('menu');
const scoreBoard = document.getElementById('score-board');
const btnBack = document.getElementById('backToMenu');

canvas.width = 400;
canvas.height = 600;

let gameState = 'menu';
let player = { x: 200, y: 550, r: 30, score: 0 };
let cpu = { x: 200, y: 50, r: 30, score: 0 };
let puck = { x: 200, y: 300, vx: 0, vy: 0, r: 18 };

// Variabili difficoltà
let cpuSpeed = 0.1;
let cpuMaxSpeed = 5;

function startGame(speed, maxSpeed) {
    cpuSpeed = speed;
    cpuMaxSpeed = maxSpeed;
    player.score = 0;
    cpu.score = 0;
    resetPuck();
    
    gameState = 'game';
    menu.style.display = 'none';
    canvas.style.display = 'block';
    scoreBoard.style.display = 'block';
    btnBack.style.display = 'block';
    
    animate();
}

function showMenu() {
    gameState = 'menu';
    menu.style.display = 'flex';
    canvas.style.display = 'none';
    scoreBoard.style.display = 'none';
    btnBack.style.display = 'none';
}

function getPos(e) {
    let rect = canvas.getBoundingClientRect();
    let clientX = e.touches ? e.touches[0].clientX : e.clientX;
    let clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

function handleMove(e) {
    if (gameState !== 'game') return;
    e.preventDefault();
    const pos = getPos(e);
    player.x = pos.x;
    player.y = pos.y;
    // Vincoli
    if (player.x < player.r) player.x = player.r;
    if (player.x > canvas.width - player.r) player.x = canvas.width - player.r;
    if (player.y < canvas.height / 2 + player.r) player.y = canvas.height / 2 + player.r;
    if (player.y > canvas.height - player.r) player.y = canvas.height - player.r;
}

canvas.addEventListener('mousemove', handleMove);
canvas.addEventListener('touchmove', handleMove, { passive: false });

function update() {
    puck.x += puck.vx;
    puck.y += puck.vy;
    puck.vx *= 0.985;
    puck.vy *= 0.985;

    // Pareti laterali
    if (puck.x < puck.r || puck.x > canvas.width - puck.r) {
        puck.vx *= -1;
        puck.x = puck.x < puck.r ? puck.r : canvas.width - puck.r;
    }
    
    // Goal
    if (puck.y < 0 || puck.y > canvas.height) {
        if (puck.x > 130 && puck.x < 270) {
            if (puck.y < 0) player.score++; else cpu.score++;
            resetPuck();
        } else {
            puck.vy *= -1;
            puck.y = puck.y < 0 ? 0 : canvas.height;
        }
    }

    // AI CPU intelligente basata sulla difficoltà selezionata
    let targetX = puck.x;
    let diffX = targetX - cpu.x;
    // Limita la velocità della CPU in base alla difficoltà
    cpu.x += Math.max(Math.min(diffX * cpuSpeed, cpuMaxSpeed), -cpuMaxSpeed);
    
    if (cpu.x < cpu.r) cpu.x = cpu.r;
    if (cpu.x > canvas.width - cpu.r) cpu.x = canvas.width - cpu.r;

    checkCollision(player);
    checkCollision(cpu);

    document.getElementById('playerScore').innerText = player.score;
    document.getElementById('cpuScore').innerText = cpu.score;
}

function checkCollision(mallet) {
    let dx = puck.x - mallet.x;
    let dy = puck.y - mallet.y;
    let distance = Math.sqrt(dx * dx + dy * dy);
    if (distance < puck.r + mallet.r) {
        let angle = Math.atan2(dy, dx);
        puck.vx = Math.cos(angle) * 12;
        puck.vy = Math.sin(angle) * 12;
        puck.x = mallet.x + (puck.r + mallet.r) * Math.cos(angle);
        puck.y = mallet.y + (puck.r + mallet.r) * Math.sin(angle);
    }
}

function resetPuck() {
    puck.x = canvas.width / 2;
    puck.y = canvas.height / 2;
    puck.vx = 0;
    puck.vy = 0;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Campo
    ctx.strokeStyle = "rgba(255,255,255,0.2)";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2); ctx.stroke();
    ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, 50, 0, Math.PI*2); ctx.stroke();

    // Porte
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 8;
    ctx.beginPath(); ctx.moveTo(130, 0); ctx.lineTo(270, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(130, canvas.height); ctx.lineTo(270, canvas.height); ctx.stroke();

    // Player (Cyan)
    ctx.fillStyle = "#00f2ff";
    ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fill();

    // CPU (Red)
    ctx.fillStyle = "#ff4444";
    ctx.beginPath(); ctx.arc(cpu.x, cpu.y, cpu.r, 0, Math.PI*2); ctx.fill();

    // Puck
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.r, 0, Math.PI*2); ctx.fill();
}

function animate() {
    if (gameState !== 'game') return;
    update();
    draw();
    requestAnimationFrame(animate);
}
</script>
</body>
</html>
