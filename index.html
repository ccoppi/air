<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Hockey Pro - V3</title>
    <style>
        body { 
            background: #1a1a1a; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; color: white; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; touch-action: none; 
        }
        #game-container { position: relative; display: flex; flex-direction: column; align-items: center; }
        canvas { 
            border: 4px solid #fff; 
            background: radial-gradient(circle, #004d40 0%, #002b24 100%);
            max-width: 95vw; max-height: 70vh; touch-action: none; display: none;
        }
        #menu, #win-screen { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .btn {
            padding: 15px 30px; font-size: 1.2rem; border: none; border-radius: 10px;
            cursor: pointer; width: 220px; color: white; font-weight: bold; transition: 0.2s;
        }
        .btn-easy { background: #4caf50; }
        .btn-medium { background: #ff9800; }
        .btn-hard { background: #f44336; }
        .btn-menu { background: #555; margin-top: 10px; width: auto; padding: 8px 20px; }
        #score-board { font-size: 1.8rem; margin-bottom: 10px; display: none; font-weight: bold; }
        #overlay-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 4rem; font-weight: bold; text-shadow: 2px 2px 15px black;
            display: none; pointer-events: none; text-align: center;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="menu">
            <h1>AIR HOCKEY PRO</h1>
            <p>Primo a 5 Goal vince!</p>
            <button class="btn btn-easy" onclick="startGame(0.05, 4, 0.3)">FACILE</button>
            <button class="btn btn-medium" onclick="startGame(0.1, 7, 0.5)">MEDIO</button>
            <button class="btn btn-hard" onclick="startGame(0.18, 11, 0.8)">DIFFICILE</button>
        </div>

        <div id="win-screen" style="display:none;">
            <h1 id="win-text">HAI VINTO!</h1>
            <button class="btn btn-menu" onclick="showMenu()">TORNA AL MENU</button>
        </div>

        <div id="score-board">
            <span style="color:#00f2ff">TU</span> <span id="playerScore">0</span> - <span id="cpuScore">0</span> <span style="color:#ff4444">CPU</span>
        </div>
        
        <canvas id="hockey"></canvas>
        <div id="overlay-msg"><span id="goal-text">GOAL!</span><br><span id="countdown">3</span></div>
        
        <button id="backToMenu" class="btn btn-menu" style="display:none;" onclick="showMenu()">TORNA AL MENU</button>
    </div>

<script>
const canvas = document.getElementById('hockey');
const ctx = canvas.getContext('2d');
const menu = document.getElementById('menu');
const winScreen = document.getElementById('win-screen');
const scoreBoard = document.getElementById('score-board');
const btnBack = document.getElementById('backToMenu');
const overlayMsg = document.getElementById('overlay-msg');
const goalText = document.getElementById('goal-text');
const countdownEl = document.getElementById('countdown');

canvas.width = 400;
canvas.height = 600;

let gameState = 'menu';
let isPaused = false;
let player = { x: 200, y: 550, r: 30, score: 0 };
let cpu = { x: 200, y: 50, r: 30, score: 0 };
let puck = { x: 200, y: 300, vx: 0, vy: 0, r: 18 };
let lastScorer = Math.random() > 0.5 ? 'player' : 'cpu'; // Per il primo avvio

let cpuIntelligence, cpuMaxSpeed, cpuAggressiveness;

function startGame(intel, maxSpd, aggr) {
    cpuIntelligence = intel; cpuMaxSpeed = maxSpd; cpuAggressiveness = aggr;
    player.score = 0; cpu.score = 0;
    gameState = 'game';
    menu.style.display = 'none'; winScreen.style.display = 'none';
    canvas.style.display = 'block'; scoreBoard.style.display = 'block'; btnBack.style.display = 'block';
    resetPuck(false, lastScorer === 'player' ? 'cpu' : 'player'); 
    animate();
}

function showMenu() {
    gameState = 'menu';
    menu.style.display = 'flex'; winScreen.style.display = 'none';
    canvas.style.display = 'none'; scoreBoard.style.display = 'none';
    btnBack.style.display = 'none'; overlayMsg.style.display = 'none';
}

function resetPuck(isGoal, receiver) {
    if (player.score >= 5 || cpu.score >= 5) { endGame(); return; }

    isPaused = true;
    puck.vx = 0; puck.vy = 0;
    
    // Posiziona il disco nella metà campo di chi ha subito goal
    puck.x = canvas.width / 2;
    puck.y = (receiver === 'player') ? 400 : 200;

    goalText.style.display = isGoal ? 'inline' : 'none';
    overlayMsg.style.display = 'block';
    
    let timeLeft = 3;
    countdownEl.innerText = timeLeft;

    let timer = setInterval(() => {
        timeLeft--;
        countdownEl.innerText = timeLeft > 0 ? timeLeft : "";
        if (timeLeft <= 0) {
            clearInterval(timer);
            overlayMsg.style.display = 'none';
            isPaused = false;
            // Lancio verso chi ha il possesso (il "receiver")
            puck.vy = (receiver === 'player') ? 5 : -5;
            puck.vx = (Math.random() - 0.5) * 4;
        }
    }, 1000);
}

function endGame() {
    gameState = 'menu';
    canvas.style.display = 'none'; scoreBoard.style.display = 'none';
    btnBack.style.display = 'none'; overlayMsg.style.display = 'none';
    winScreen.style.display = 'flex';
    document.getElementById('win-text').innerText = player.score >= 5 ? "HAI VINTO!" : "LA CPU HA VINTO!";
    document.getElementById('win-text').style.color = player.score >= 5 ? "#00f2ff" : "#ff4444";
}

function getPos(e) {
    let rect = canvas.getBoundingClientRect();
    let clientX = e.touches ? e.touches[0].clientX : e.clientX;
    let clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: (clientX - rect.left) * (canvas.width / rect.width), y: (clientY - rect.top) * (canvas.height / rect.height) };
}

canvas.addEventListener('mousemove', e => { if(gameState==='game') { const p = getPos(e); player.x = p.x; player.y = p.y; limitPos(player, true); }});
canvas.addEventListener('touchmove', e => { e.preventDefault(); if(gameState==='game') { const p = getPos(e); player.x = p.x; player.y = p.y; limitPos(player, true); }}, {passive:false});

function limitPos(obj, isPlayer) {
    if (obj.x < obj.r) obj.x = obj.r;
    if (obj.x > canvas.width - obj.r) obj.x = canvas.width - obj.r;
    if (isPlayer) {
        if (obj.y < canvas.height / 2 + obj.r) obj.y = canvas.height / 2 + obj.r;
        if (obj.y > canvas.height - obj.r) obj.y = canvas.height - obj.r;
    } else {
        if (obj.y < obj.r) obj.y = obj.r;
        if (obj.y > canvas.height / 2 - obj.r) obj.y = canvas.height / 2 - obj.r;
    }
}

function update() {
    if (isPaused) return;

    puck.x += puck.vx;
    puck.y += puck.vy;
    puck.vx *= 0.985;
    puck.vy *= 0.985;

    if (puck.x < puck.r || puck.x > canvas.width - puck.r) {
        puck.vx *= -1;
        puck.x = puck.x < puck.r ? puck.r : canvas.width - puck.r;
    }
    
    if (puck.y < 0 || puck.y > canvas.height) {
        if (puck.x > 130 && puck.x < 270) {
            if (puck.y < 0) {
                player.score++;
                resetPuck(true, 'cpu'); // La CPU ha subito goal, riceve il disco
            } else {
                cpu.score++;
                resetPuck(true, 'player'); // Il Player ha subito goal, riceve il disco
            }
        } else {
            puck.vy *= -1;
            puck.y = puck.y < 0 ? 0 : canvas.height;
        }
    }

    // IA CPU
    let targetX = puck.x;
    let targetY = 50;
    const inCorner = (puck.y < 80 && (puck.x < 100 || puck.x > 300));

    if (inCorner) {
        targetX = canvas.width / 2; targetY = 60;
    } else if (puck.y < canvas.height * 0.45) {
        targetY = puck.y - 20;
    } else {
        targetY = 50 + (puck.y * 0.08 * cpuAggressiveness);
    }

    let dx = targetX - cpu.x;
    let dy = targetY - cpu.y;
    cpu.x += Math.max(Math.min(dx * cpuIntelligence, cpuMaxSpeed), -cpuMaxSpeed);
    cpu.y += Math.max(Math.min(dy * cpuIntelligence, cpuMaxSpeed), -cpuMaxSpeed);
    
    limitPos(cpu, false);
    checkCollision(player);
    checkCollision(cpu);

    document.getElementById('playerScore').innerText = player.score;
    document.getElementById('cpuScore').innerText = cpu.score;
}

function checkCollision(mallet) {
    let dx = puck.x - mallet.x;
    let dy = puck.y - mallet.y;
    let distance = Math.sqrt(dx * dx + dy * dy);
    if (distance < puck.r + mallet.r) {
        let angle = Math.atan2(dy, dx);
        let force = 14; 
        puck.vx = Math.cos(angle) * force;
        puck.vy = Math.sin(angle) * force;
        puck.x = mallet.x + (puck.r + mallet.r) * Math.cos(angle);
        puck.y = mallet.y + (puck.r + mallet.r) * Math.sin(angle);
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2); ctx.stroke();
    ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, 50, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 8;
    ctx.beginPath(); ctx.moveTo(130, 0); ctx.lineTo(270, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(130, canvas.height); ctx.lineTo(270, canvas.height); ctx.stroke();
    drawCircle(player.x, player.y, player.r, "#00f2ff");
    drawCircle(cpu.x, cpu.y, cpu.r, "#ff4444");
    drawCircle(puck.x, puck.y, puck.r, "#fff");
}

function drawCircle(x, y, r, color) {
    ctx.fillStyle = color; ctx.shadowBlur = 10; ctx.shadowColor = color;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
}

function animate() {
    if (gameState !== 'game') return;
    update(); draw(); requestAnimationFrame(animate);
}
</script>
</body>
</html>
