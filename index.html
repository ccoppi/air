<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Air Hockey Mobile</title>
    <style>
        body { 
            background: #1a1a1a; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Impedisce lo scroll della pagina */
            touch-action: none; /* Disabilita i gesti del browser come il pinch-to-zoom */
        }
        canvas { 
            border: 4px solid #fff; 
            background: radial-gradient(circle, #004d40 0%, #002b24 100%);
            box-shadow: 0 0 25px rgba(0,0,0,0.7);
            max-width: 95vw;
            max-height: 80vh;
            touch-action: none;
        }
        #ui { margin-bottom: 10px; text-align: center; }
        h1 { font-size: 1.5rem; margin: 5px 0; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Score: <span id="playerScore">0</span> - <span id="cpuScore">0</span></h1>
    </div>
    <canvas id="hockey"></canvas>

<script>
const canvas = document.getElementById('hockey');
const ctx = canvas.getContext('2d');
const pScore = document.getElementById('playerScore');
const cScore = document.getElementById('cpuScore');

// Dimensioni fisse del gioco (logiche)
canvas.width = 400;
canvas.height = 600;

let player = { x: 200, y: 550, r: 30, score: 0 };
let cpu = { x: 200, y: 50, r: 30, score: 0 };
let puck = { x: 200, y: 300, vx: 0, vy: 0, r: 18 };

// Funzione per calcolare la posizione corretta (sia mouse che touch)
function getPos(e) {
    let rect = canvas.getBoundingClientRect();
    let clientX, clientY;
    
    if (e.touches) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    } else {
        clientX = e.clientX;
        clientY = e.clientY;
    }

    // Proporzione tra dimensione reale del canvas e dimensione visualizzata
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;

    return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
    };
}

function handleMove(e) {
    e.preventDefault(); // Evita scroll o refresh su mobile
    const pos = getPos(e);
    player.x = pos.x;
    player.y = pos.y;

    // Vincoli: non uscire dai bordi laterali e non superare la metà campo
    if (player.x < player.r) player.x = player.r;
    if (player.x > canvas.width - player.r) player.x = canvas.width - player.r;
    if (player.y < canvas.height / 2 + player.r) player.y = canvas.height / 2 + player.r;
    if (player.y > canvas.height - player.r) player.y = canvas.height - player.r;
}

// Eventi Mouse e Touch
canvas.addEventListener('mousemove', handleMove);
canvas.addEventListener('touchmove', handleMove, { passive: false });
canvas.addEventListener('touchstart', handleMove, { passive: false });

function update() {
    puck.x += puck.vx;
    puck.y += puck.vy;
    puck.vx *= 0.985; // Leggermente meno attrito per fluidità
    puck.vy *= 0.985;

    // Rimbalzi pareti laterali
    if (puck.x < puck.r || puck.x > canvas.width - puck.r) {
        puck.vx *= -1;
        puck.x = puck.x < puck.r ? puck.r : canvas.width - puck.r;
    }
    
    // Goal e pareti fondo
    if (puck.y < puck.r || puck.y > canvas.height - puck.r) {
        if (puck.x > 130 && puck.x < 270) {
            if (puck.y < puck.r) player.score++; else cpu.score++;
            resetPuck();
        } else {
            puck.vy *= -1;
            puck.y = puck.y < puck.r ? puck.r : canvas.height - puck.r;
        }
    }

    // AI CPU (un po' più reattiva)
    let cpuSpeed = 0.12;
    cpu.x += (puck.x - cpu.x) * cpuSpeed;
    if (cpu.x < cpu.r) cpu.x = cpu.r;
    if (cpu.x > canvas.width - cpu.r) cpu.x = canvas.width - cpu.r;

    checkCollision(player);
    checkCollision(cpu);

    pScore.innerText = player.score;
    cScore.innerText = cpu.score;
}

function checkCollision(mallet) {
    let dx = puck.x - mallet.x;
    let dy = puck.y - mallet.y;
    let distance = Math.sqrt(dx * dx + dy * dy);
    if (distance < puck.r + mallet.r) {
        let angle = Math.atan2(dy, dx);
        let speed = 12; // Velocità di rimbalzo fissata
        puck.vx = Math.cos(angle) * speed;
        puck.vy = Math.sin(angle) * speed;
        
        // Evita che il puck rimanga incastrato nel mallet
        puck.x = mallet.x + (puck.r + mallet.r) * Math.cos(angle);
        puck.y = mallet.y + (puck.r + mallet.r) * Math.sin(angle);
    }
}

function resetPuck() {
    puck.x = canvas.width / 2;
    puck.y = canvas.height / 2;
    puck.vx = 0;
    puck.vy = 0;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Linea metà campo e cerchio centrale
    ctx.strokeStyle = "rgba(255,255,255,0.3)";
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2); ctx.stroke();
    ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, 50, 0, Math.PI*2); ctx.stroke();

    // Porte
    ctx.strokeStyle = "yellow";
    ctx.lineWidth = 8;
    ctx.beginPath(); ctx.moveTo(130, 0); ctx.lineTo(270, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(130, canvas.height); ctx.lineTo(270, canvas.height); ctx.stroke();

    // Mallet Player
    ctx.fillStyle = "#00f2ff";
    ctx.shadowBlur = 10; ctx.shadowColor = "#00f2ff";
    ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fill();

    // Mallet CPU
    ctx.fillStyle = "#ff0055";
    ctx.shadowColor = "#ff0055";
    ctx.beginPath(); ctx.arc(cpu.x, cpu.y, cpu.r, 0, Math.PI*2); ctx.fill();

    // Puck
    ctx.fillStyle = "white";
    ctx.shadowBlur = 5; ctx.shadowColor = "white";
    ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.r, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    update();
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
